name: Build and Upload LaZagne Release

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
    - uses: actions/checkout@v3

    - name: Set up Python 3.11
      uses: actions/setup-python@v4
      with:
        python-version: 3.11
        cache: 'pip'

    - name: Generate Random Version ID
      id: gen_id
      shell: pwsh
      run: |
        $random_str = -join ((65..90) + (97..122) + (48..57) | Get-Random -Count 8 | % {[char]$_})
        $timestamp = Get-Date -Format "yyyyMMdd-HHmm"
        $final_id = "rel-$timestamp-$random_str"
        echo "RAND_ID=$final_id" >> $env:GITHUB_ENV

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pyinstaller
        pip install -r requirements.txt

    - name: Build Executable (Static One-File)
      shell: pwsh
      run: |
        cd Windows
        python -m PyInstaller lazagne.spec

    - name: Create Release
      id: create_release
      uses: softprops/action-gh-release@v1
      with:
        tag_name: ${{ env.RAND_ID }}
        name: Build-${{ env.RAND_ID }}
        draft: false
        prerelease: false
        files: Windows/dist/*.exe 

    - name: Finalizing
      run: echo "Deployment of ${{ env.RAND_ID }} completed."
